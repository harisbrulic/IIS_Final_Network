name: Fetch, Preprocess, Validate

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python getting ready
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: DVC getting ready
        uses: iterative/setup-dvc@v1

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Configure DVC
        run: |
          dvc remote modify origin endpointurl https://dagshub.com/haris.brulic/IIS_Final_Network.s3
          dvc remote modify origin --local access_key_id ${{ secrets.DAGSHUB_ACCESS_KEY_ID }}
          dvc remote modify origin --local secret_access_key ${{ secrets.DAGSHUB_SECRET_ACCESS_KEY }}

      - name: Pull from DVC
        run: dvc pull
      
      - name: Fetch threatfox
        run: python src/data/threatfox_fetch.py
        env:
          THREATFOX_API_KEY: ${{ secrets.THREATFOX_API_KEY }}

      - name: Preprocess
        run: python src/data/preprocess_data.py

      - name: Validate
        run: python gx/exceptions.py

      - name: Push to DVC
        run: dvc push

      - name: Check changes
        run: git status

      - name: Commit new data
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/
          git add dvc.lock
          git commit -m "Update live threats $(date)" || echo "No changes"
          git push